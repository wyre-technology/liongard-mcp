# Smithery configuration file: https://smithery.ai/docs/config#smitheryyaml
startCommand:
  type: stdio
  configSchema:
    type: object
    required:
      - liongardApiKey
      - liongardInstance
    properties:
      liongardApiKey:
        type: string
        description: Your Liongard API key
      liongardInstance:
        type: string
        description: Your Liongard instance URL
  commandFunction: |-
    (config) => ({ command: 'node', args: ['dist/index.js'], env: { LIONGARD_API_KEY: config.liongardApiKey, LIONGARD_INSTANCE: config.liongardInstance, MCP_TRANSPORT: 'stdio' } })
